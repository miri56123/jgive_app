services:
  - type: web
    name: jgive-app
    env: ruby
    plan: free
    buildCommand: bundle install && bundle exec rails assets:precompile && bundle exec rails db:migrate && bundle exec rails db:seed
    startCommand: bundle exec rails server -b 0.0.0.0
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: true
      - key: RAILS_LOG_TO_STDOUT
        value: true
    disk:
      name: jgive-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
